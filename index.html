<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Sprite Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="UNO_LOGO.png" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>UNO Card Generator</h1>
        </header>
        
        <main class="app-main">
            <div class="preview-section">
                <div class="canvas-wrapper premium-card" id="canvasWrapper">
                    <canvas id="cardCanvas" draggable="true"></canvas>
                    <div id="dragHint" class="drag-hint">Drag card to Deck</div>
                </div>
                <div class="action-bar">
                    <button id="downloadBtn" class="button">
                        <span>Download PNG</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    </button>
                    <button id="shareBtn" class="button secondary">
                        <span>Share</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                    </button>
                </div>
                
                <div id="deckContainer" class="deck-container premium-card">
                    <div class="deck-stack" id="deckStack">
                        <!-- Back side cards will be here -->
                    </div>
                    <div class="deck-info">
                        <span id="deckCount">0</span> cards in Deck
                    </div>
                </div>

                <div id="toast" class="toast premium-card" style="display: none;">Link copied to clipboard!</div>
            </div>

            <!-- Deck Modal -->
            <div id="deckModal" class="modal-overlay" style="display: none;">
                <div class="modal-content premium-card">
                    <div class="modal-header">
                        <h2>Your Custom Deck</h2>
                        <div class="modal-actions">
                            <button id="applyToAllBtn" class="button secondary small">Apply Current Style to All</button>
                            <button id="exportPdfBtn" class="button secondary small">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                <span>Export PDF for Print</span>
                            </button>
                            <button id="closeModal" class="close-button">&times;</button>
                        </div>
                    </div>
                    <div id="deckList" class="deck-list">
                        <!-- Deck items will be injected here -->
                    </div>
                </div>
            </div>

            <!-- Upload Style Modal -->
            <div id="uploadModal" class="modal-overlay" style="display: none;">
                <div class="modal-content premium-card style-upload-modal">
                    <div class="modal-header">
                        <h2>Upload Custom Style</h2>
                        <button id="closeUploadModal" class="close-button">&times;</button>
                    </div>
                    <div class="upload-form">
                        <div class="form-group">
                            <label>Style Name</label>
                            <input type="text" id="customStyleName" placeholder="My Epic Theme" class="modal-input">
                        </div>
                        <div class="upload-grid">
                            <div class="upload-box">
                                <span>Backgrounds</span>
                                <input type="file" id="upBg" multiple accept="image/*">
                            </div>
                            <div class="upload-box">
                                <span>Corners/Overlays</span>
                                <input type="file" id="upOv" multiple accept="image/*">
                            </div>
                            <div class="upload-box">
                                <span>Centers</span>
                                <input type="file" id="upCt" multiple accept="image/*">
                            </div>
                            <div class="upload-box">
                                <span>Card Back</span>
                                <input type="file" id="upBack" accept="image/*">
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button id="createStyleBtn" class="button primary full-width">Create Style</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls-section">
                <div class="control-group premium-card">
                    <h3>Card Style</h3>
                    <div id="styleGrid" class="asset-grid">
                    </div>
                </div>

                <div class="control-group premium-card">
                    <h3>Background Layer</h3>
                    <div id="bgGrid" class="asset-grid">
                    </div>
                </div>

                <div class="control-group premium-card">
                    <h3>Corner Overlay</h3>
                    <div id="overlayGrid" class="asset-grid">
                    </div>
                </div>

                <div class="control-group premium-card">
                    <h3>Center Layer</h3>
                    <div id="centerGrid" class="asset-grid">
                    </div>
                </div>
            </div>
        </main>
        <footer class="app-footer">
            <p>UNO Card Generator | <span id="version">loading...</span></p>
            <p>Created by Yaros | 2026</p>
        </footer>
    </div>
    <script src="script.js"></script>
    <script>
        fetch("https://api.github.com/repos/2158YarosGol2158/UNO-Card-Generator/commits/main")
        .then(res => res.json())
        .then(data => {
            let msg = data.commit.message;
            msg = msg.replace(/^Update\s*/i, "");
            const match = msg.match(/v\d+\.\d+\.\d+/);
            if (match) {
            msg = match[0];
            } else {
            msg = "dev build";
            }

            document.getElementById("version").textContent = msg;
        })
        .catch(() => {
            document.getElementById("version").textContent = "offline";
        });
</script>
</body>
</html>
